app = 'astraia-net'
primary_region = 'nrt'

[build]

#################################################
# HTTP 服务（你现在正常工作的部分）
#################################################
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

#################################################
# UDP 服务（KCP 关键配置！新增部分）
#################################################
[[services]]
  protocol = "udp"
  internal_port = 7777

  ports = [
    { port = 7777, handlers = [] }
  ]

#################################################
# VM 配置
#################################################
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256